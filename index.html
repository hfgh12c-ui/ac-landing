    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #e0f7fa 100%);
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 520px;
      border-radius: 28px;
      overflow: hidden;

    /* Decorative blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .blob-1 {
      top: 0; left: 0;
      width: 280px; height: 280px;
      background: radial-gradient(circle, #fff 0%, transparent 70%);
      opacity: 0.1;
      transform: translate(-35%, -35%);
    }
    .blob-2 {
      top: 33%; right: 0;
      width: 200px; height: 200px;
      background: radial-gradient(circle, #7dd3fc 0%, transparent 70%);
      opacity: 0.08;
      transform: translateX(40%);
    }
    .blob-3 {
      bottom: 0; left: 50%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, #38bdf8 0%, transparent 70%);
      opacity: 0.08;
      transform: translate(-50%, 40%);
    }

    /* Header */
    .header-band {
      position: relative; z-index: 10;
      background: linear-gradient(90deg, #facc15, #fbbf24, #f59e0b);
      text-align: center;
      padding: 12px 24px;
    }
    .header-band p {
      color: #082f49;
      font-weight: 900;
      font-size: 1.1rem;

    .city-wrap {

      background: rgba(255,255,255,0.18);
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 6px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(6px);
    }

    /* Price section */
    .price-section {
      position: relative; z-index: 10;
      text-align: center;
      padding: 16px 24px 20px;
    }
    .price-label {
      color: rgba(255,255,255,0.8);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .price-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .price-num {
      font-size: 5.5rem;
      font-weight: 900;
      line-height: 1;
      color: #fde68a;

      border-radius: 16px;
      padding: 8px 24px;

    .offer-badge p {
      font-weight: 900;
      font-size: 1.1rem;
      color: #fde047;
    }

      margin: 0 32px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    /* Services grid */
    .services {
      position: relative; z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 20px 24px;
    }
    .service-item {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 18px;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.22);

      margin: 0 24px 16px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      padding: 12px;

      gap: 12px;
      padding: 0 24px 24px;
    }
    .btn {

      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      border-radius: 18px;
      padding: 16px 12px;
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: 1.05rem;
      color: #fff;
      text-decoration: none;
      transition: transform 0.12s ease, filter 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); filter: brightness(0.9); }
    .btn:hover { filter: brightness(1.08); }
    .btn-call {
